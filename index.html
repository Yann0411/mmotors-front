  <!DOCTYPE html>
  <html lang="fr">
  <head>

      <meta charset="UTF-8">
      <title>M-Motors</title>
      <link rel="stylesheet" href="styles.css">
  </head>
  <body>

      <!-- la Page daccueil -->
   <nav class="navbar">
    <span class="navbar-brand">M-Motors</span>
    <div class="navbar-user">
        <button class="btn-nav-link" 
        onclick="window.location.href='espaceClient/espaceClient.html'">Mon espace
        client</button>
        <button class="btn-nav-link" 
        onclick="window.location.href='dossier/dossier.html'">Déposer un dossier</button>

        
        <div>
            <span id="nom-utilisateur"></span>
            <button class="btn-deconnecter" onclick="seDeconnecter()">Se déconnecter</button>
            
             
        </div>
       
     </div>
    </nav>

<!-- la Page daccueil -->
<div class="accueil" id="accueil">
    <h1>M-Motors</h1>

    <p>Trouvez le véhicule qui vous correspond</p>

    <p class="accroche">Depuis 1987, M-Motors vous accompagne dans l'achat et la location de véhicules d'occasion de qualité.<br>
    Plus d'un million de clients nous font confiance à travers toute la France.</p>

    <div class="choix">
        <button class="btn-choix btn-achat" onclick="afficherCatalogue('ACHAT')">Catalogue Achat</button>
        <button class="btn-choix btn-location" onclick="afficherCatalogue('LOCATION')">Catalogue Location</button>
    </div>

</div>


      <!-- Page catalogue -->
      <div class="catalogue" id="catalogue">
          <button class="btn-retour" onclick="retourAccueil()">← Retour</button>
          <h2 id="titre-catalogue"></h2>

          <div class="filtres">
              <input type="text" id="filtre-marque" placeholder="Marque">

              <input type="text" id="filtre-modele" placeholder="Modèle">
              <input type="number" id="filtre-prix-min" placeholder="Prix min (€)">
              <input type="number" id="filtre-prix-max" placeholder="Prix max (€)">
              <input type="number" id="filtre-km" placeholder="Km max">
              <button onclick="rechercherVehicules()">Rechercher</button>
          </div>

          <div class="liste-vehicules" id="liste-vehicules"></div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

      <script src="vehicules.js"></script>

  </body>
  </html>
