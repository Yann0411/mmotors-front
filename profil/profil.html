<!DOCTYPE html>
  <html lang="fr">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>M-Motors - Mon profil</title>
      <link rel="stylesheet" href="../styles.css">
      <link rel="stylesheet" href="profil.css">
  </head>
  <body>

      <nav class="navbar">
          <a class="navbar-brand" href="../index.html">M-Motors</a>
            <div class="navbar-user">
              <span id="nom-utilisateur"></span>
              <button class="btn-deconnecter" onclick="seDeconnecter()">Se déconnecter</button>


          </div>
      </nav>

      <div class="profil-container">

            <button class="btn-retour" onclick="window.location.href='../espaceClient/espaceClient.html'">← Retour</button>

          <div class="profil-header">
              <h1>Mon profil</h1>
                <p>Consultez et modifiez vos informations personnelles.</p>
          </div>

          <!-- infos en lecture seule -->
          <div class="profil-box">

              <h2>Informations</h2>


              <div class="champ-groupe">
                  <label>Email</label>
                    <input type="text" id="profil-email" disabled>
              </div>

              <div class="champ-groupe">
                  <label for="profil-nom">Nom <span class="requis">*</span></label>
                  <input type="text" id="profil-nom" placeholder="Votre nom">
              </div>

                <div class="champ-groupe">
                  <label for="profil-prenom">Prénom <span class="requis">*</span></label>
                  <input type="text" id="profil-prenom" placeholder="Votre prénom">
              </div>




              <button id="btn-profil" onclick="sauvegarderProfil()">Sauvegarder</button>

              <p id="msg-profil" class="message"></p>
          </div>

          <!-- changement mot de passe -->
          <div class="profil-box">

              <h2>Changer le mot de passe</h2>

              <div class="champ-groupe">

                    <label for="ancien-mdp">Mot de passe actuel <span class="requis">*</span></label>
                  <div class="champ-mdp">
                      <input type="password" id="ancien-mdp" placeholder="Mot de passe actuel">
                      <button class="btn-oeil" onclick="toggleMdp('ancien-mdp', this)">👁</button>
                  </div>
              </div>

              <div class="champ-groupe">

                  <label for="nouveau-mdp">Nouveau mot de passe <span class="requis">*</span></label>
                    <div class="champ-mdp">
                      <input type="password" id="nouveau-mdp" placeholder="Nouveau mot de passe">
                      <button class="btn-oeil" onclick="toggleMdp('nouveau-mdp', this)">👁</button>
                  </div>
              </div>

              <button id="btn-mdp" onclick="changerMotDePasse()">Modifier le mot de passe</button>

                <p id="msg-mdp" class="message"></p>
          </div>

      </div>

      <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
      <script src="profil.js"></script>

  </body>
  </html>
