<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Motors - Déposer un dossier</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="dossier.css">
</head>
<body>

    <nav class="navbar">
    <a class="navbar-brand" href="../index.html">M-Motors</a>

    <div class="navbar-user">
        <span id="nom-utilisateur"></span>
        <button class="btn-deconnecter" onclick="seDeconnecter()">Se déconnecter</button>
    </div>
    </nav>



    <div class="auth-container">

        <div class="auth-box">
            <button onclick="window.location.href='../index.html'">← Retour</button>
        
              <h2>Déposer un dossier</h2>

            <select id="typeOffre">
                <option value="ACHAT">Achat</option>
                
                <option value="LOCATION">Location</option>

            </select>

<textarea id="message" placeholder="Décrivez précisément le véhicule souhaité (marque, modèle, Kilométrages...). Une description incomplete sera automatiquement refusée." required></textarea>


            <button onclick="deposerDossier()">Envoyer mon dossier</button>

        <p id="msg-dossier" class="message"></p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="dossier.js"></script>

</body>
</html>
