<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M-Motors - Connexion</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-brand">
        <h1>M-Motors</h1>
        <p>Achat et Location de Véhicules</p>
      </div>

      <!-- Formulaire connexion -->
      <div class="auth-box" id="box-connexion">
        <h2>Connexion</h2>

        <div class="champ-groupe">
          <label for="connexion-email"
            >Email <span class="requis">*</span></label
          >
          <input
            type="email"
            id="connexion-email"
            placeholder="votre@email.com"
            autocomplete="email"
          />
          <span class="erreur-champ" id="err-connexion-email"></span>
        </div>

        <div class="champ-groupe">
          <label for="connexion-mdp"
            >Mot de passe <span class="requis">*</span></label
          >
          <div class="champ-mdp">
            <input
              type="password"
              id="connexion-mdp"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="btn-oeil"
              onclick="toggleMdp('connexion-mdp', this)"
              aria-label="Afficher le mot de passe"
            >
              &#128065;
            </button>
          </div>
          <span class="erreur-champ" id="err-connexion-mdp"></span>
        </div>

        <button id="btn-connexion" onclick="seConnecter()">Se connecter</button>
        <p id="msg-connexion" class="message"></p>
        <p class="lien-bascule">
          Pas encore de compte ?
          <a href="#" onclick="afficherInscription()">S'inscrire</a>
        </p>
        <p class="lien-bascule">
          <a href="#" onclick="afficherReset()">Mot de passe oublié ?</a>
        </p>
      </div>

      <!-- Formulaire inscription -->
      <div class="auth-box" id="box-inscription" style="display: none">
        <h2>Inscription</h2>

        <div class="champ-groupe">
          <label for="inscription-nom">Nom <span class="requis">*</span></label>
          <input
            type="text"
            id="inscription-nom"
            placeholder="Votre nom"
            autocomplete="family-name"
          />

          <span class="erreur-champ" id="err-inscription-nom"></span>
        </div>

        <div class="champ-groupe">
          <label for="inscription-prenom"
            >Prénom <span class="requis">*</span></label
          >
          <input
            type="text"
            id="inscription-prenom"
            placeholder="Votre prénom"
            autocomplete="given-name"
          />

          <span class="erreur-champ" id="err-inscription-prenom"></span>
        </div>

        <div class="champ-groupe">
          <label for="inscription-email"
            >Email <span class="requis">*</span></label
          >
          <input
            type="email"
            id="inscription-email"
            placeholder="votre@email.com"
            autocomplete="email"
          />
          <span class="erreur-champ" id="err-inscription-email"></span>
        </div>

        <div class="champ-groupe">
          <label for="inscription-mdp"
            >Mot de passe <span class="requis">*</span></label
          >
          <div class="champ-mdp">
            <input
              type="password"
              id="inscription-mdp"
              placeholder="8 car. min, 1 maj, 1 chiffre, 1 spécial"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="btn-oeil"
              onclick="toggleMdp('inscription-mdp', this)"
              aria-label="Afficher le mot de passe"
            >
              &#128065;
            </button>
          </div>
          <span class="erreur-champ" id="err-inscription-mdp"></span>
        </div>

        <button id="btn-inscription" onclick="sInscrire()">
          Créer mon compte
        </button>
        <p id="msg-inscription" class="message"></p>
        <p class="lien-bascule">
          Déjà un compte ?
          <a href="#" onclick="afficherConnexion()">Se connecter</a>
        </p>
        <!-- Formulaire mot de passe oublié -->
      </div>

      <div class="auth-box" id="box-reset" style="display: none">
        <h2>Réinitialiser le mot de passe</h2>

        <div class="champ-groupe">
          <label for="reset-email">Email <span class="requis">*</span></label>
          <input
            type="email"
            id="reset-email"
            placeholder="votre@email.com"
            autocomplete="email"
          />
          <span class="erreur-champ" id="err-reset-email"></span>
        </div>

        <div class="champ-groupe">
          <label for="reset-mdp"
            >Nouveau mot de passe <span class="requis">*</span></label
          >
          <div class="champ-mdp">
            <input
              type="password"
              id="reset-mdp"
              placeholder="8 car. min, 1 maj, 1 chiffre, 1 spécial"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="btn-oeil"
              onclick="toggleMdp('reset-mdp', this)"
              aria-label="Afficher le mot de passe"
            >
              &#128065;
            </button>
          </div>
          <span class="erreur-champ" id="err-reset-mdp"></span>
        </div>

        <div class="champ-groupe">
          <label for="reset-mdp-confirm"
            >Confirmer le mot de passe <span class="requis">*</span></label
          >
          <div class="champ-mdp">
            <input
              type="password"
              id="reset-mdp-confirm"
              placeholder="Confirmer le mot de passe"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="btn-oeil"
              onclick="toggleMdp('reset-mdp-confirm', this)"
              aria-label="Afficher le mot de passe"
            >
              &#128065;
            </button>
          </div>
          <span class="erreur-champ" id="err-reset-mdp-confirm"></span>
        </div>

        <button id="btn-reset" onclick="reinitialiserMotDePasse()">
          Réinitialiser
        </button>
        <p id="msg-reset" class="message"></p>
        <p class="lien-bascule">
          Retour à la <a href="#" onclick="afficherConnexion()">connexion</a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
